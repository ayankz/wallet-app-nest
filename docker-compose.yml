version: '3.8'

services:
  db:
    image: postgres:12
    container_name: wallet_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: wallet_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

